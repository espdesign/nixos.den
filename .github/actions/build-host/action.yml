name: Build NixOS Host
description: Build a NixOS host configuration and report status with truncated, sanitized logs

inputs:
  host:
    description: Host name to build
    required: true
  flake-attribute:
    description: Flake attribute to build (derived from host by default)
    required: false
    default: ''
  max-log-lines:
    description: Maximum lines to capture from build log
    required: false
    default: '200'

outputs:
  status:
    description: Build result ('success' or 'failure')
    value: ${{ steps.build.outputs.status }}
  log:
    description: Truncated build output, sanitized for safe display
    value: ${{ steps.build.outputs.log }}

runs:
  using: composite
  steps:
    - id: build
      shell: bash
      run: |
        host="${{ inputs.host }}"
        attr="${{ inputs.flake-attribute }}"
        if [ -z "$attr" ]; then
          attr=".#nixosConfigurations.${host}.config.system.build.toplevel"
        fi
        max_lines=${{ inputs.max-log-lines }}

        echo "Building ${host} (${attr})..."
        log_file="$(mktemp)"
        if nix build "$attr" --no-link > "$log_file" 2>&1; then
          echo "status=success" >> "$GITHUB_OUTPUT"
        else
          rc=$?
          echo "status=failure" >> "$GITHUB_OUTPUT"
          echo "--- Build failed ---"
          cat "$log_file"
          echo "--- End build log ---"
        fi

        log_content="$({ grep -v -E 'copying (path|source)|these .* paths will be fetched|^  /nix/store/|Git tree .* is dirty' "$log_file" || true; } | tail -n "$max_lines" | sed 's/`//g')"
        delimiter="EOF_$(date +%s)_${host}"
        {
          echo "log<<${delimiter}"
          echo "$log_content"
          echo "${delimiter}"
        } >> "$GITHUB_OUTPUT"
        rm -f "$log_file"

    - shell: bash
      run: |
        status="${{ steps.build.outputs.status }}"
        host="${{ inputs.host }}"
        icon=":white_check_mark:"
        [ "$status" = "failure" ] && icon=":x:"
        echo "${icon} **${host}**: ${status}" >> "$GITHUB_STEP_SUMMARY"
