name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
        with:
          github-token: '${{ github.token }}'
      - name: Flake Check
        run: ./.github/scripts/flake-check.sh
      - name: Lint Check
        run: ./.github/scripts/lint.sh