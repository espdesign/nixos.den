name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v17
        with:
          name: espdesign
          # CI only needs to read from the cache, so no authToken required here
          # unless you want every push to populate the cache.
          # authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Register Nix Problem Matcher
        run: echo "::add-matcher::.github/nix-problem-matcher.json"
      - name: Flake Check
        run: nix flake check
