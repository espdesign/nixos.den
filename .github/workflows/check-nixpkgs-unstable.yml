name: "Check Nixpkgs Unstable Channel"
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - name: Compare channel rev vs flake.lock
        id: compare
        run: |
          CHANNEL_REV=$(curl -sL https://channels.nixos.org/nixpkgs-unstable/git-revision)
          LOCKED_REV=$(python3 -c "import json; print(json.load(open('flake.lock'))['nodes']['nixpkgs']['locked']['rev'])")
          echo "channel=$CHANNEL_REV" >> "$GITHUB_OUTPUT"
          echo "locked=$LOCKED_REV" >> "$GITHUB_OUTPUT"
          if [ "$CHANNEL_REV" != "$LOCKED_REV" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  update:
    needs: check
    if: needs.check.outputs.changed == 'true'
    uses: ./.github/workflows/reusable-flake-update.yml
    with:
      update-command: 'nix flake update nixpkgs'
      branch-name: 'update-nixpkgs-unstable'
      pr-title: 'chore: update nixpkgs-unstable'
    secrets:
      FLAKE_UPDATE_TOKEN: ${{ secrets.FLAKE_UPDATE_TOKEN }}