name: "Reusable: Flake Update Pipeline"
on:
  workflow_call:
    inputs:
      update-command:
        required: true
        type: string
      branch-name:
        required: true
        type: string
      pr-title:
        required: true
        type: string
    secrets:
      FLAKE_UPDATE_TOKEN:
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Run update command
        run: ${{ inputs.update-command }}
      - name: Check for changes
        id: check
        run: |
          if ! git diff --quiet flake.lock; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload changed flake.lock
        if: steps.check.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: updated-flake-lock
          path: flake.lock

  build-hosts:
    needs: update
    if: needs.update.outputs.changed == 'true'
    strategy:
      matrix:
        host: [hinekora, kitava, valako]
    name: Build ${{ matrix.host }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download updated flake.lock
        uses: actions/download-artifact@v4
        with:
          name: updated-flake-lock
          path: .
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Build Toplevel
        run: |
          nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel --accept-flake-config 2> /tmp/warnings-raw.txt
          grep -i 'warning:' /tmp/warnings-raw.txt > /tmp/warnings-${{ matrix.host }}.txt || true
      - name: Upload eval warnings
        uses: actions/upload-artifact@v4
        with:
          name: warnings-${{ matrix.host }}
          path: /tmp/warnings-${{ matrix.host }}.txt

  create-pr:
    needs: [update, build-hosts]
    if: needs.update.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download updated flake.lock
        uses: actions/download-artifact@v4
        with:
          name: updated-flake-lock
          path: .
      - name: Commit and force push
        run: |
          git checkout -b "${{ inputs.branch-name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "${{ inputs.pr-title }}"
          git push --force origin "${{ inputs.branch-name }}"
      - name: Download eval warnings
        uses: actions/download-artifact@v4
        with:
          pattern: warnings-*
          path: /tmp/warnings
          merge-multiple: true
      - name: Create or update Pull Request
        env:
          GH_TOKEN: ${{ secrets.FLAKE_UPDATE_TOKEN }}
        run: |
          BODY="$(.github/scripts/build-pr-body.sh /tmp/warnings)"
          EXISTING=$(gh pr list --head "${{ inputs.branch-name }}" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --body "$BODY"
            echo "Updated existing PR #$EXISTING"
          else
            gh pr create \
              --head "${{ inputs.branch-name }}" \
              --title "${{ inputs.pr-title }}" \
              --body "$BODY" \
              --label "dependencies" \
              --label "automated"
          fi