name: Update Flake
on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  update-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Use the provided token for checkout to allow triggering other workflows if needed
          token: ${{ secrets.FLAKE_UPDATE_TOKEN }}

      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Update flake.lock
        run: |
          nix flake update
          git add -A

      - uses: ./.github/actions/build-host
        id: hinekora
        with:
          host: hinekora

      - uses: ./.github/actions/build-host
        id: kitava
        with:
          host: kitava

      - uses: ./.github/actions/build-host
        id: valako
        with:
          host: valako

      - name: Create Pull Request
        if: steps.hinekora.outputs.status == 'success' && steps.kitava.outputs.status == 'success' && steps.valako.outputs.status == 'success'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.FLAKE_UPDATE_TOKEN }}
          commit-message: "chore(deps): update flake.lock"
          committer: GitHub <noreply@github.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          signoff: false
          branch: update/flake-lock
          delete-branch: true
          title: "chore(deps): update flake.lock"
          body: |
            Automated flake update and host build verification.

            ### Build Status
            - **hinekora**: ${{ steps.hinekora.outputs.status }}
            - **kitava**: ${{ steps.kitava.outputs.status }}
            - **valako**: ${{ steps.valako.outputs.status }}

            <details>
            <summary>hinekora build logs</summary>

            ```text
            ${{ steps.hinekora.outputs.log }}
            ```
            </details>

            <details>
            <summary>kitava build logs</summary>

            ```text
            ${{ steps.kitava.outputs.log }}
            ```
            </details>

            <details>
            <summary>valako build logs</summary>

            ```text
            ${{ steps.valako.outputs.log }}
            ```
            </details>

            This PR was generated by the [Update Flake](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.
          labels: |
            dependencies
            automated
