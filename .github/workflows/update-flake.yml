name: Update Flake
on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  update-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use the provided token for checkout to allow triggering other workflows if needed
          token: ${{ secrets.FLAKE_UPDATE_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: espdesign
          # Ensure CACHIX_AUTH_TOKEN is set in your repository secrets to populate the cache
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Update flake.lock
        run: nix flake update

      - name: Verify host builds
        run: |
          echo "Building hinekora..."
          nix build .#nixosConfigurations.hinekora.config.system.build.toplevel --no-link
          
          echo "Building kitava..."
          nix build .#nixosConfigurations.kitava.config.system.build.toplevel --no-link
          
          echo "Building valako..."
          nix build .#nixosConfigurations.valako.config.system.build.toplevel --no-link

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.FLAKE_UPDATE_TOKEN }}
          commit-message: "chore(deps): update flake.lock"
          committer: GitHub <noreply@github.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          signoff: false
          branch: update/flake-lock
          delete-branch: true
          title: "chore(deps): update flake.lock"
          body: |
            Automated flake update and host build verification.

            Hosts verified:
            - hinekora
            - kitava
            - valako

            This PR was generated by the [Update Flake](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.
          labels: |
            dependencies
            automated
