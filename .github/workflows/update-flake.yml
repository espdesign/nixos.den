name: Update Flake
on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      has-changes: ${{ steps.check.outputs.has-changes }}
      head-sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.FLAKE_UPDATE_TOKEN }}
          fetch-depth: 0

      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Update flake.lock
        env:
          GITHUB_TOKEN: ${{ secrets.FLAKE_UPDATE_TOKEN }}
        run: |
          nix flake update 2>&1 | { grep -v -E 'warning: (Git tree .* is dirty|updating lock file)' || true; }

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        id: commit
        if: steps.check.outputs.has-changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(deps): update flake.lock"
          git push --force origin HEAD:refs/heads/update/flake-lock
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  list-hosts:
    needs: update
    if: needs.update.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      hosts: ${{ steps.hosts.outputs.hosts }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.update.outputs.head-sha }}

      - name: Discover hosts
        id: hosts
        run: |
          hosts=$(ls modules/hosts/*.nix | xargs -I{} basename {} .nix | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "hosts=$hosts" >> "$GITHUB_OUTPUT"

  build:
    needs: [update, list-hosts]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        host: ${{ fromJson(needs.list-hosts.outputs.hosts) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.FLAKE_UPDATE_TOKEN }}
          ref: ${{ needs.update.outputs.head-sha }}

      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - uses: ./.github/actions/build-host
        id: build
        with:
          host: ${{ matrix.host }}

      - name: Save build result
        if: always()
        env:
          STATUS: ${{ steps.build.outputs.status }}
          LOG: ${{ steps.build.outputs.log }}
        run: |
          echo "$STATUS" > build-status.txt
          echo "$LOG" > build-log.txt

      - name: Upload build result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.host }}
          path: |
            ${{ github.workspace }}/build-status.txt
            ${{ github.workspace }}/build-log.txt
          retention-days: 1
          overwrite: true

  create-pr:
    needs: [update, list-hosts, build]
    if: always() && needs.update.result == 'success' && needs.update.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.FLAKE_UPDATE_TOKEN }}

      - name: Download all build results
        uses: actions/download-artifact@v8
        with:
          path: build-results
          pattern: build-*

      - name: Determine build status
        id: status
        run: |
          all_success=true
          hosts='${{ needs.list-hosts.outputs.hosts }}'
          status_lines=""

          for host in $(echo "$hosts" | jq -r '.[]'); do
            status_file="build-results/build-${host}/build-status.txt"
            if [ -f "$status_file" ]; then
              status=$(cat "$status_file")
            else
              status="skipped"
            fi

            if [ "$status" != "success" ]; then
              all_success=false
            fi

            status_lines="${status_lines}\n- **${host}**: ${status}"
          done

          echo "all-success=${all_success}" >> "$GITHUB_OUTPUT"
          echo "host-status<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$status_lines" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build Summary
        run: |
          hosts='${{ needs.list-hosts.outputs.hosts }}'
          echo "## Build Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          for host in $(echo "$hosts" | jq -r '.[]'); do
            status_file="build-results/build-${host}/build-status.txt"
            if [ -f "$status_file" ]; then
              status=$(cat "$status_file")
            else
              status="skipped"
            fi
            icon=":white_check_mark:"
            [ "$status" != "success" ] && icon=":x:"
            echo "${icon} **${host}**: ${status}" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Create Pull Request
        if: steps.status.outputs.all-success == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.FLAKE_UPDATE_TOKEN }}
          commit-message: "chore(deps): update flake.lock"
          committer: GitHub <noreply@github.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          signoff: false
          branch: update/flake-lock
          delete-branch: true
          title: "chore(deps): update flake.lock"
          body: |
            Automated flake update and host build verification.

            ### Build Status
            ${{ steps.status.outputs.host-status }}

            This PR was generated by the [Update Flake](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.
          labels: |
            dependencies
            automated
