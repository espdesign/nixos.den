name: Update Flake
on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      has-changes: ${{ steps.check.outputs.has-changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.FLAKE_UPDATE_TOKEN }}
          fetch-depth: 0

      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Update flake.lock
        env:
          GITHUB_TOKEN: ${{ secrets.FLAKE_UPDATE_TOKEN }}
        run: |
          nix flake update 2>&1 | { grep -v -E 'warning: (Git tree .* is dirty|updating lock file)' || true; }

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload updated flake.lock
        if: steps.check.outputs.has-changes == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: updated-flake-lock
          path: flake.lock
          retention-days: 1
          overwrite: true

  list-hosts:
    needs: update
    if: needs.update.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      hosts: ${{ steps.hosts.outputs.hosts }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Discover hosts
        id: hosts
        run: .github/scripts/discover-hosts.sh

  build:
    needs: [update, list-hosts]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        host: ${{ fromJson(needs.list-hosts.outputs.hosts) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download updated flake.lock
        uses: actions/download-artifact@v8
        with:
          name: updated-flake-lock
          path: temp-flake

      - name: Overwrite flake.lock and stage it
        run: |
          mv temp-flake/flake.lock flake.lock
          git add flake.lock

      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - uses: ./.github/actions/build-host
        id: build
        with:
          host: ${{ matrix.host }}

      - name: Save build result
        if: always()
        env:
          STATUS: ${{ steps.build.outputs.status }}
          LOG: ${{ steps.build.outputs.log }}
        run: |
          echo "$STATUS" > build-status.txt
          echo "$LOG" > build-log.txt

      - name: Upload build result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.host }}
          path: |
            ${{ github.workspace }}/build-status.txt
            ${{ github.workspace }}/build-log.txt
          retention-days: 1
          overwrite: true

  create-pr:
    needs: [update, list-hosts, build]
    if: always() && needs.update.result == 'success' && needs.update.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.FLAKE_UPDATE_TOKEN }}

      - name: Download updated flake.lock
        uses: actions/download-artifact@v8
        with:
          name: updated-flake-lock
          path: temp-flake

      - name: Overwrite flake.lock
        run: mv temp-flake/flake.lock flake.lock

      - name: Download all build results
        uses: actions/download-artifact@v8
        with:
          path: build-results
          pattern: build-*

      - name: Determine build status
        id: status
        run: .github/scripts/determine-status.sh '${{ needs.list-hosts.outputs.hosts }}'

      - name: Build Summary
        run: .github/scripts/build-summary.sh '${{ needs.list-hosts.outputs.hosts }}'

      - name: Create Pull Request
        if: steps.status.outputs.all-success == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.FLAKE_UPDATE_TOKEN }}
          commit-message: "chore(deps): update flake.lock"
          committer: GitHub <noreply@github.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          signoff: false
          branch: update/flake-lock
          delete-branch: true
          title: "chore(deps): update flake.lock"
          body: |
            Automated flake update and host build verification.

            ### Build Status
            ${{ steps.status.outputs.host-status }}

            This PR was generated by the [Update Flake](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.
          labels: |
            dependencies
            automated
