name: Update Flake
on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  update-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Use the provided token for checkout to allow triggering other workflows if needed
          token: ${{ secrets.FLAKE_UPDATE_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: espdesign
          # Ensure CACHIX_AUTH_TOKEN is set in your repository secrets to populate the cache
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Register Nix Problem Matcher
        run: echo "::add-matcher::.github/nix-problem-matcher.json"

      - name: Update flake.lock
        run: |
          nix flake update
          git add -A

      - name: Verify host builds
        id: build
        run: |
          all_success=true
          build_host() {
            local host=$1
            echo "Building $host..."
            # Capture both stdout and stderr, but only keep the last 50 lines to avoid PR body limits
            local log_file="build_${host}.log"
            if nix build .#nixosConfigurations."$host".config.system.build.toplevel --no-link > "$log_file" 2>&1; then
              echo "${host}_status=success" >> "$GITHUB_OUTPUT"
            else
              echo "${host}_status=failure" >> "$GITHUB_OUTPUT"
              all_success=false
            fi
            # Sanitize log for markdown (remove backticks and other problematic chars)
            local log_content=$(tail -n 50 "$log_file" | sed 's/`//g')
            {
              echo "${host}_log<<EOF"
              echo "$log_content"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          }

          build_host "hinekora"
          build_host "kitava"
          build_host "valako"
          
          echo "all_success=$all_success" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.build.outputs.all_success == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.FLAKE_UPDATE_TOKEN }}
          commit-message: "chore(deps): update flake.lock"
          committer: GitHub <noreply@github.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          signoff: false
          branch: update/flake-lock
          delete-branch: true
          title: "chore(deps): update flake.lock"
          body: |
            Automated flake update and host build verification.

            ### Build Status
            - **hinekora**: ${{ steps.build.outputs.hinekora_status }}
            - **kitava**: ${{ steps.build.outputs.kitava_status }}
            - **valako**: ${{ steps.build.outputs.valako_status }}

            <details>
            <summary>hinekora build logs</summary>

            ```text
            ${{ steps.build.outputs.hinekora_log }}
            ```
            </details>

            <details>
            <summary>kitava build logs</summary>

            ```text
            ${{ steps.build.outputs.kitava_log }}
            ```
            </details>

            <details>
            <summary>valako build logs</summary>

            ```text
            ${{ steps.build.outputs.valako_log }}
            ```
            </details>

            This PR was generated by the [Update Flake](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.
          labels: |
            dependencies
            automated
