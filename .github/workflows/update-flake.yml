name: "Automated Flake Update"
on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.push.outputs.branch }}
      updated: ${{ steps.push.outputs.updated }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix flake update
      - name: Commit and push
        id: push
        run: |
          if ! git diff --quiet flake.lock; then
            BRANCH="update-flake/$(date +'%Y-%m-%d-%H%M%S')"
            git checkout -b "$BRANCH"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add flake.lock
            git commit -m "chore: update flake.lock"
            git push origin "$BRANCH"
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi

  build-hosts:
    needs: update
    if: needs.update.outputs.updated == 'true'
    strategy:
      matrix:
        host: [hinekora, kitava, valako]
    name: Build ${{ matrix.host }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.update.outputs.branch }}
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: |
          cat <<-EOF > modules/ci-runtime.nix
          { _module.args.CI = true; }
          EOF
      - name: Build Toplevel
        run: |
          nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel --accept-flake-config 2> /tmp/warnings-raw.txt
          grep -i 'warning:' /tmp/warnings-raw.txt > /tmp/warnings-${{ matrix.host }}.txt || true

      - name: Upload eval warnings
        uses: actions/upload-artifact@v4
        with:
          name: warnings-${{ matrix.host }}
          path: /tmp/warnings-${{ matrix.host }}.txt

  create-pr:
    needs: [build-hosts, update]
    if: needs.update.outputs.updated == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.update.outputs.branch }}
      - uses: actions/download-artifact@v4
        with:
          pattern: warnings-*
          path: /tmp/warnings
          merge-multiple: true
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.FLAKE_UPDATE_TOKEN }}
        run: |
          WARNINGS=""
          for f in /tmp/warnings/*.txt; do
            if [ -s "$f" ]; then
              HOST=$(basename "$f" .txt | sed 's/^warnings-//')
              WARNINGS="$WARNINGS### $HOST"$'\n'"\`\`\`"$'\n'"$(cat "$f")"$'\n'"\`\`\`"$'\n'
            fi
          done
          BODY="Automated flake.lock update."
          if [ -n "$WARNINGS" ]; then
            BODY="$BODY"$'\n\n'"## Eval Warnings"$'\n\n'"$WARNINGS"
          fi
          gh pr create \
            --title "chore: update flake.lock" \
            --body "$BODY" \
            --label "dependencies" \
            --label "automated"
